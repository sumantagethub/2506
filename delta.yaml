name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Current Directory
        shell: powershell
        run: |
          Write-Host "===== CURRENT DIRECTORY ====="
          Get-Location

      - name: List Repository Files
        shell: powershell
        run: |
          Write-Host "===== REPOSITORY FILES ====="
          Get-ChildItem -Recurse

      - name: Display provider.tf
        shell: powershell
        run: |
          Write-Host "===== provider.tf ====="
          if (Test-Path ".\provider.tf") {
              Get-Content ".\provider.tf"
          }
          else {
              Write-Host "provider.tf NOT FOUND"
          }

      - name: Check Azure CLI
        run: az --version

      - name: Azure Login
        shell: powershell
        run: |
          az login --service-principal --username 033c042d-e6cc-4399-91cf-b93b7bd5dcba  --password yrV8Q~1ANlabpp-KGcK2C2aqhRx3YGm3XUxwHbxq --tenant 4611c619-c77c-404a-b26f-b286f3681168


      - name: Set Azure Subscription
        run: |
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Verify Azure Login
        run: |
          az account show

      - name: Check Terraform Version
        run: terraform --version

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
